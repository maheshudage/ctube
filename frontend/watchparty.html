<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party Sidebar</title>
    <link rel="stylesheet" href="watchparty.css">
</head>
<body>

<div class="main-container">
    <div class="tabs">

        <button class="tab-btn active" onclick="openTab(event, 'chat-tab')">
        <span class="icon"><img src="../public/icons/chat.png"></span>
        </button>
       
        <button class="tab-btn" onclick="openTab(event, 'video-tab')">
            <span class="icon"><img src="../public/icons/video.png"></span>
        </button>

        <button class="tab-btn" onclick="openTab(event, 'people-tab')">
            <span class="icon"><img src="../public/icons/participants.png"></span>
        </button>
    </div>

    <div id="chat-tab" class="tab-content show">
    <div class="content-body" id="chat-box">
        
    </div>

    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type your message ...">
        <button class="send-btn" id="send-btn">
            <img src="../public/icons/send.png">
        </button>
    </div>
    </div>


    <script>
    const sendBtn = document.getElementById("send-btn");
    const chatInput = document.getElementById("chat-input");
    const chatBox = document.getElementById("chat-box");

    function sendMessage() {
        const message = chatInput.value.trim();

        if (message === "") return;

        // Create new message
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("msg");

        msgDiv.innerHTML = `<span class="avatar grey"></span> ${message}`;

        // Add message at TOP
        chatBox.prepend(msgDiv);

        // Clear input
        chatInput.value = "";
    }

    // Click event
    sendBtn.addEventListener("click", sendMessage);

    // Enter key support
    chatInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
    </script>


    <div id="video-tab" class="tab-content">
        <div class="content-body">
            <div class="list-item">
                <div class="card">
                   <div class="thumb"><span class="time"></span></div>
                        <div class="card-info">
                            <div class="avatar"></div>
                        <div>
                        <h4>Title of the video uploaded by this channel</h4>
                        <p>Channel Name</p>
                        <span>7,343 views • 2 Months ago</span>
                        </div>
                        </div>
                </div>
            </div>
            
           <div class="list-item">
                <div class="card">
                    <div class="thumb"><span class="time"></span></div>
                        <div class="card-info">
                            <div class="avatar"></div>
                        <div>
                        <h4>Title of the video uploaded by this channel</h4>
                        <p>Channel Name</p>
                        <span>7,343 views • 2 Months ago</span>
                        </div>
                        </div>
                </div>
            </div>

        </div>

        <div class="input-area">
            <input type="text" placeholder="Click here to add video link into the queue....">
        </div>
        
    </div>

    <div id="people-tab" class="tab-content">
        <div class="content-body">
            <div class="list-item">Person 1</div>
            <div class="list-item">Person 2</div>
            <div class="list-item">Person 3</div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        var content = document.getElementsByClassName("tab-content");
        for (var i = 0; i < content.length; i++) {
            content[i].classList.remove("show");
        }
        var buttons = document.getElementsByClassName("tab-btn");
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove("active");
        }
        document.getElementById(tabName).classList.add("show");
        evt.currentTarget.classList.add("active");
    }
</script>

</body>
</html>
